<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cilt Bakım Takibim</title>
<style>
  :root{
    --bg:#f4f3ee; --card:#ffffff; --line:#e3e1d9; --line2:#c9c7bd;
    --text:#1f1f1d; --muted:#8a897f; --accent:#185fa5; --accentbg:#e6f1fb;
    --warn:#854f0b; --warnbg:#faeeda; --warnline:#e0b46a; --red:#993c1d; --soft:#f8f7f2;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1b1b19; --card:#262521; --line:#3a3833; --line2:#4a473f;
      --text:#ececea; --muted:#9a988e; --accent:#7fb2e6; --accentbg:#16314c;
      --warn:#f0c06a; --warnbg:#3a2e16; --warnline:#5a4a22; --red:#e0996f; --soft:#201f1c; }
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif; padding:14px; }
  #app{ max-width:460px; margin:0 auto; }
  .head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .h1{ font-size:18px; font-weight:600; }
  .sub{ font-size:12px; color:var(--muted); }
  .pills{ display:flex; gap:5px; }
  .pill{ font-size:13px; font-weight:500; padding:8px 13px; border-radius:20px; cursor:pointer; border:0.5px solid var(--line); color:var(--muted); background:var(--card); }
  .pill.on{ background:var(--accentbg); color:var(--accent); border-color:transparent; }
  .nav{ display:flex; align-items:center; justify-content:space-between; background:var(--card); border:0.5px solid var(--line); border-radius:12px; padding:6px; margin-bottom:10px; }
  .navbtn{ width:46px; height:46px; display:flex; align-items:center; justify-content:center; border-radius:10px; cursor:pointer; }
  .navbtn:active{ background:var(--soft); }
  .navbtn svg{ width:22px; height:22px; stroke:var(--muted); fill:none; stroke-width:2; }
  .nti{ text-align:center; }
  .nday{ font-size:15px; font-weight:600; }
  .nth{ font-size:11px; color:var(--muted); }
  .dps{ display:flex; gap:4px; margin-bottom:14px; }
  .dp{ flex:1; text-align:center; font-size:12px; padding:8px 0; border-radius:7px; cursor:pointer; color:var(--muted); }
  .dp.on{ background:var(--accentbg); color:var(--accent); font-weight:600; }
  .barwrap{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .bar{ flex:1; height:8px; background:var(--soft); border-radius:10px; overflow:hidden; }
  .barfill{ height:100%; background:var(--accent); border-radius:10px; transition:width .25s; }
  .barnum{ font-size:13px; font-weight:600; color:var(--muted); min-width:36px; text-align:right; }
  .resetwrap{ text-align:right; margin-bottom:6px; }
  .reset{ font-size:12px; color:var(--muted); background:var(--card); border:0.5px solid var(--line); border-radius:8px; padding:8px 12px; cursor:pointer; }
  .reset:active{ background:var(--soft); }
  .sec{ font-size:13px; font-weight:600; color:var(--muted); margin:16px 0 9px; }
  .row{ display:flex; align-items:center; gap:12px; padding:13px 12px; background:var(--card); border:0.5px solid var(--line); border-radius:10px; margin-bottom:7px; cursor:pointer; user-select:none; min-height:52px; }
  .row:active{ background:var(--soft); }
  .box{ width:24px; height:24px; border-radius:6px; border:2px solid var(--line2); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .box svg{ width:15px; height:15px; stroke:#fff; fill:none; stroke-width:3; display:none; }
  .box.on{ background:var(--accent); border-color:var(--accent); }
  .box.on svg{ display:block; }
  .txt{ font-size:14px; line-height:1.35; }
  .row.done .txt{ color:var(--muted); text-decoration:line-through; }
  .acc{ color:var(--red); font-weight:600; }
  .accb{ color:var(--accent); font-weight:600; }
  .small{ color:var(--muted); font-size:12px; }
  .spf{ background:var(--warnbg); border-color:var(--warnline); }
  .spf .txt{ color:var(--warn); font-weight:600; }
  .dev{ background:var(--soft); border-style:dashed; cursor:default; }
  .dev:active{ background:var(--soft); }
  .dev .txt{ color:var(--muted); font-size:13px; }
  .foot{ height:10px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  var CHK='<svg viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"/></svg>';
  var LT='<svg viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>';
  var RT='<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>';
  function A(x,s,k){return{x:x,s:s||"",k:k||""};}
  function am(b){return[A("Temizlik · COSRX Salicylic"),A("Tonik · Skin1004 Centella"),A("Aydınlatıcı · "+b,"","b"),A("Göz · Tonymoly Snail"),A("Nemlendirici · Anua Heartleaf"),A("Güneş kremi · Bioré SPF50 (şart)","","spf")];}
  function retPM(r){return[A("Temizlik · COSRX"),A("Retinoid · "+r,"","r"),A("Nemlendirici · Anua + Ceramide"),A("Göz · Anua Retinol eye"),A("Cihaz: bu gece YOK (retinoid gecesi)","","dev")];}
  function exfoPM(a){return[A("Temizlik · COSRX"),A("Asit · "+a,"pamukla","r"),A("Yatıştırma · Anua PDRN+HA"),A("Nemlendirici · Anua Heartleaf"),A("Göz · Shiseido Benefiance"),A("Cihaz: bu gece YOK (asit gecesi)","","dev")];}
  function pdrnPM(s,m){return[A("Temizlik"),A("Tonik · Skin1004 Centella"),A("PDRN · "+s,"","b"),A("Cihaz: Booster Mode · PDRN ile, 5 dk","","dev"),A("Nemlendirici · "+m),A("Cihaz: MC + Derma Shot · krem ile","","dev"),A("Göz · Shiseido Benefiance")];}
  function poreP(s,m){return[A("Temizlik → yüz KURU"),A("Cihaz: Air Shot · kuru yüz, gözenek 5 dk","","dev"),A("Tonik · Anua PDRN+HA"),A("Cihaz: Booster Mode · PDRN ile","","dev"),A("PDRN · "+s,"","b"),A("Nemlendirici · "+m),A("Cihaz: Derma Shot · çene-elmacık","","dev"),A("Göz · Tonymoly Snail")];}
  var peelPM=[A("Temizlik · COSRX"),A("Güçlü peeling · TO AHA30+BHA2 (MAX 10 dk, durula)","","r"),A("Tonik · Skin1004 Centella"),A("Yoğun yatıştırma · Anua + Ceramide"),A("Nemlendirici · Dr.Althea 345"),A("Cihaz: bu gece YOK","","dev")];
  var maskPM=[A("Temizlik · COSRX"),A("Maske · Keana Rice Pack (durula)"),A("Hidrasyon · Anua PDRN+HA"),A("Nemlendirici · Anua Heartleaf"),A("Cihaz: opsiyonel · Booster Mode","","dev")];
  function restPM(){return[A("Temizlik"),A("Tonik · Skin1004 Centella"),A("Bakuchiol · Eqqual Berry"),A("Gece serumu · Shiseido Vital Perfection"),A("Nemlendirici · Anua Heartleaf"),A("Göz · Shiseido Benefiance"),A("Cihaz: opsiyonel · hafif Booster/MC","","dev")];}

  var DAYS=["Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi","Pazar"];
  var SHORT=["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];
  var data={
    1:[
      {th:"Retinoid gecesi · Retinal",am:am("Melano CC (C vit)"),pm:retPM("Celimax Retinal")},
      {th:"Onarım + cihaz gecesi",am:am("Ultimune + AXIS-Y"),pm:pdrnPM("Rejuran Ampoule","Dr.Althea 345")},
      {th:"Eksfoliasyon gecesi",am:am("Alpha Arbutin"),pm:exfoPM("TO Glycolic 7%")},
      {th:"Retinoid gecesi · Retinol",am:am("Melano CC (C vit)"),pm:retPM("Celimax Retinol")},
      {th:"Gözenek + cihaz gecesi",am:am("Botocare Dark Spot"),pm:poreP("Frankly PDRN","Dr.Althea 345")},
      {th:"Güçlü peeling gecesi",am:am("COSRX Niacinamide 15"),pm:peelPM},
      {th:"Dinlenme · hidrasyon",am:am("Shiseido White Lucent"),pm:restPM()}
    ],
    2:[
      {th:"Retinoid gecesi · Retinol",am:am("Alpha Arbutin"),pm:retPM("Celimax Retinol")},
      {th:"Onarım + cihaz gecesi",am:am("Shiseido White Lucent"),pm:pdrnPM("Anua PDRN+HA","Anua Heartleaf")},
      {th:"Eksfoliasyon gecesi",am:am("AXIS-Y Dark Spot"),pm:exfoPM("SomeByMi AHA·BHA·PHA")},
      {th:"Retinoid gecesi · Retinal",am:am("Melano CC (C vit)"),pm:retPM("Celimax Retinal")},
      {th:"Gözenek + cihaz gecesi",am:am("Botocare Dark Spot"),pm:poreP("Rejuran Dual Effect","Dr.Althea 345")},
      {th:"Maske gecesi",am:am("COSRX Niacinamide 15"),pm:maskPM},
      {th:"Dinlenme · hidrasyon",am:am("Shiseido Ultimune"),pm:restPM()}
    ]
  };

  var KEY="serhan-cilt-takip-v1";
  var checked={};
  try{ var raw=localStorage.getItem(KEY); if(raw) checked=JSON.parse(raw); }catch(e){ checked={}; }
  function save(){ try{ localStorage.setItem(KEY,JSON.stringify(checked)); }catch(e){} }

  var week=1, day=(new Date().getDay()+6)%7;
  function ck(p,i){ var k="w"+week+"d"+day+p; return !!(checked[k]&&checked[k][i]); }
  function toggle(p,i){ var k="w"+week+"d"+day+p; if(!checked[k])checked[k]=[]; checked[k][i]=!checked[k][i]; save(); render(); }

  function rowHTML(p,i,s){
    if(s.k==="dev") return '<div class="row dev"><span class="box" style="border:none"></span><span class="txt">'+s.x+'</span></div>';
    var on=ck(p,i), label=s.x;
    if(s.k==="r") label=label.replace(/· (.+)/,'· <span class="acc">$1</span>');
    if(s.k==="b") label=label.replace(/· (.+)/,'· <span class="accb">$1</span>');
    var sub=s.s?' <span class="small">('+s.s+')</span>':'';
    return '<div class="row '+(s.k==="spf"?"spf ":"")+(on?"done":"")+'" data-p="'+p+'" data-i="'+i+'">'
      +'<span class="box '+(on?"on":"")+'">'+CHK+'</span><span class="txt">'+label+sub+'</span></div>';
  }
  function render(){
    var d=data[week][day], done=0, tot=0;
    d.am.forEach(function(s,i){ if(s.k!=="dev"){tot++; if(ck("am",i))done++;} });
    d.pm.forEach(function(s,i){ if(s.k!=="dev"){tot++; if(ck("pm",i))done++;} });
    var pct=tot?Math.round(done/tot*100):0, h='';
    h+='<div class="head"><div><div class="h1">Cilt bakım takibim</div><div class="sub">Serhan · 2 haftalık program</div></div>'
      +'<div class="pills"><span class="pill '+(week===1?"on":"")+'" data-w="1">Hafta 1</span><span class="pill '+(week===2?"on":"")+'" data-w="2">Hafta 2</span></div></div>';
    h+='<div class="nav"><div class="navbtn" data-nav="-1">'+LT+'</div><div class="nti"><div class="nday">'+DAYS[day]+'</div><div class="nth">'+d.th+'</div></div><div class="navbtn" data-nav="1">'+RT+'</div></div>';
    h+='<div class="dps">'+SHORT.map(function(s,i){return '<div class="dp '+(i===day?"on":"")+'" data-d="'+i+'">'+s+'</div>';}).join('')+'</div>';
    h+='<div class="barwrap"><div class="bar"><div class="barfill" style="width:'+pct+'%"></div></div><span class="barnum">'+done+'/'+tot+'</span></div>';
    h+='<div class="resetwrap"><button class="reset" data-reset="1">Bu günü sıfırla</button></div>';
    h+='<div class="sec">SABAH</div>'+d.am.map(function(s,i){return rowHTML("am",i,s);}).join('');
    h+='<div class="sec">GECE</div>'+d.pm.map(function(s,i){return rowHTML("pm",i,s);}).join('');
    h+='<div class="foot"></div>';
    var app=document.getElementById('app'); app.innerHTML=h;
    app.querySelectorAll('.row[data-p]').forEach(function(el){el.addEventListener('click',function(){toggle(el.getAttribute('data-p'),+el.getAttribute('data-i'));});});
    app.querySelectorAll('.pill[data-w]').forEach(function(el){el.addEventListener('click',function(){week=+el.getAttribute('data-w');render();});});
    app.querySelectorAll('.dp[data-d]').forEach(function(el){el.addEventListener('click',function(){day=+el.getAttribute('data-d');render();});});
    app.querySelectorAll('[data-nav]').forEach(function(el){el.addEventListener('click',function(){day=(day+ +el.getAttribute('data-nav')+7)%7;render();});});
    var rb=app.querySelector('[data-reset]'); if(rb)rb.addEventListener('click',function(){checked["w"+week+"d"+day+"am"]=[];checked["w"+week+"d"+day+"pm"]=[];save();render();});
  }
  render();
})();
</script>
</body>
</html>
